<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flete Hub Automation | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Flete Hub <span>Automation</span></h1>
            <p>Sube tus ofertas de forma rápida y segura.</p>
        </header>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="grid">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" value="" required>
                </div>
                <div class="form-group full-width">
                    <label for="contacto">Valor de Contacto (Override)</label>
                    <input type="text" id="contacto" name="contacto" placeholder="Nombre o Teléfono que aparecerá en el portal">
                </div>
            </div>

            <div class="upload-zone" id="dropZone">
                <input type="file" id="dataFile" name="dataFile" accept=".xlsx,.xls,.csv" hidden>
                <div class="upload-content">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <p id="fileName">Arrastra tu archivo Excel o CSV aquí o <span>haz clic para buscar</span></p>
                </div>
            </div>

            <div class="options">
                <label class="checkbox-container">
                    Modo Dry Run (Simulacro)
                    <input type="checkbox" id="dryRun" name="dryRun" checked>
                    <span class="checkmark"></span>
                </label>
            </div>

            <button type="submit" id="runBtn" class="primary-btn">Iniciar Automatización</button>
        </form>

        <section class="terminal-container">
            <h3>Terminal de Estado</h3>
            <div id="terminal" class="terminal">
                <div class="log-line system">Esperando inicio...</div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
